<!DOCTYPE html>
<html>
<head>
  <title>Login - resQvoice</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
  <h1>resQvoice</h1>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<script>
const BASE_URL = "https://resqvoice.onrender.com";

async function register() {
  const email = emailInput();
  const password = passInput();

  const res = await fetch(`${BASE_URL}/register`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();
  alert(data.message);
}

async function login() {
  const email = emailInput();
  const password = passInput();

  const res = await fetch(`${BASE_URL}/login`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.success) {
    localStorage.setItem("user", email);
    window.location.href = "/dashboard";
  } else {
    alert("Invalid login");
  }
}

function emailInput(){ return document.getElementById("email").value; }
function passInput(){ return document.getElementById("password").value; }

</script>

</body>
</html>
